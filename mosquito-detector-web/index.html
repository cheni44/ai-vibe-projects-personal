<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mosquito Detector</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🦟 Mosquito Detector</h1>

    <!-- Live preview + bounding-box overlay -->
    <div class="preview-wrapper">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="overlay"></canvas>
    </div>

    <!-- Pre-permission hint (shown while browser dialog is pending) -->
    <div id="permBanner" class="perm-banner" hidden>
      <span class="perm-banner-icon">📷</span>
      <span>瀏覽器即將詢問相機權限，請點擊「<strong>允許</strong>」以繼續</span>
    </div>

    <!-- Camera error message + recovery steps + retry -->
    <div id="errorMsg" class="error-msg" hidden>
      <p id="errorText"></p>
      <ol id="permSteps" class="perm-steps" hidden></ol>
      <button id="retryBtn" class="btn btn-retry" hidden>🔄 重試</button>
    </div>

    <!-- Start / Stop + Flip Camera -->
    <div class="controls">
      <button id="startBtn">▶ Start</button>
      <button id="flipBtn" disabled>🔄 Flip Camera</button>
    </div>

    <!-- Proximity meter (visual blobs) -->
    <div class="proximity-section">
      <p id="proximityText">👁 視覺距離：—</p>
      <div class="prox-bar-bg">
        <div id="proxBar"></div>
      </div>
    </div>

    <!-- Sound detection meter (mic FFT) -->
    <div class="sound-section">
      <p id="soundText">🎙 聲音偵測：—</p>
      <div class="sound-bar-bg">
        <div id="soundBar"></div>
      </div>
    </div>

    <!-- Sensitivity slider -->
    <div class="sensitivity-section">
      <label for="sensitivitySlider">
        Sensitivity: <span id="sensitivityValue">50%</span>
      </label>
      <input
        type="range"
        id="sensitivitySlider"
        min="0"
        max="1"
        step="0.01"
        value="0.5"
      />
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>

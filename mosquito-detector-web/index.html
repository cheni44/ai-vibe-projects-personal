<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mosquito Detector</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🦟 Mosquito Detector</h1>

    <!-- Live preview + bounding-box overlay -->
    <div class="preview-wrapper">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="overlay"></canvas>
    </div>

    <!-- Camera error message -->
    <div id="errorMsg" class="error-msg" hidden></div>

    <!-- Start / Stop + Flip Camera -->
    <div class="controls">
      <button id="startBtn">▶ Start</button>
      <button id="flipBtn" disabled>🔄 Flip Camera</button>
    </div>

    <!-- Proximity meter -->
    <div class="proximity-section">
      <p id="proximityText">Proximity: —</p>
      <div class="prox-bar-bg">
        <div id="proxBar"></div>
      </div>
    </div>

    <!-- Sensitivity slider -->
    <div class="sensitivity-section">
      <label for="sensitivitySlider">
        Sensitivity: <span id="sensitivityValue">50%</span>
      </label>
      <input
        type="range"
        id="sensitivitySlider"
        min="0"
        max="1"
        step="0.01"
        value="0.5"
      />
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
